<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body data-theme="light">
  <div class="et-shell">
    <header class="et-header">
      <div>
        <p class="et-eyebrow">Money flow control</p>
        <h1>Expense Tracker</h1>
      </div>
      <button class="et-theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <span id="themeToggleLabel">Dark mode</span>
      </button>
    </header>

    <main class="et-main">
      <section class="et-summary-grid" aria-label="Summary cards">
        <article class="et-card et-summary et-summary-income">
          <p>Total Income</p>
          <h2 id="totalIncome">₹0.00</h2>
        </article>
        <article class="et-card et-summary et-summary-expense">
          <p>Total Expenses</p>
          <h2 id="totalExpense">₹0.00</h2>
        </article>
        <article class="et-card et-summary et-summary-balance">
          <p>Net Balance</p>
          <h2 id="netBalance">₹0.00</h2>
        </article>
      </section>

      <section class="et-layout">
        <div class="et-stack">
          <section class="et-card">
            <div class="et-section-head">
              <div>
                <p class="et-eyebrow">Transaction form</p>
                <h2 id="formTitle">Add Transaction</h2>
              </div>
              <button class="et-text-button is-hidden" id="cancelEditBtn" type="button">Cancel edit</button>
            </div>

            <form id="transactionForm" novalidate>
              <div class="et-type-switch" role="radiogroup" aria-label="Transaction type">
                <label class="et-type-option">
                  <input type="radio" name="type" value="income" checked>
                  <span>Income</span>
                </label>
                <label class="et-type-option">
                  <input type="radio" name="type" value="expense">
                  <span>Expense</span>
                </label>
              </div>

              <div class="et-form-grid">
                <label class="et-field">
                  <span>Description</span>
                  <input id="description" name="description" type="text" maxlength="100" placeholder="Client payment">
                  <small class="et-error" data-error-for="description"></small>
                </label>

                <label class="et-field">
                  <span>Amount</span>
                  <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="0.00">
                  <small class="et-error" data-error-for="amount"></small>
                </label>

                <label class="et-field">
                  <span>Category</span>
                  <select id="category" name="category"></select>
                  <small class="et-error" data-error-for="category"></small>
                </label>

                <label class="et-field">
                  <span>Date</span>
                  <input id="date" name="date" type="date">
                  <small class="et-error" data-error-for="date"></small>
                </label>
              </div>

              <small class="et-error et-form-error" data-error-for="form"></small>

              <button class="et-primary-button" id="submitBtn" type="submit">Add Transaction</button>
            </form>
          </section>

          <section class="et-card">
            <div class="et-section-head">
              <div>
                <p class="et-eyebrow">Filters and sorting</p>
                <h2>Focus the view</h2>
              </div>
            </div>

            <div class="et-filter-grid">
              <label class="et-field">
                <span>Type</span>
                <select id="filterType" name="filterType">
                  <option value="all">All</option>
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
              </label>

              <label class="et-field">
                <span>Category</span>
                <select id="filterCategory" name="filterCategory"></select>
              </label>

              <label class="et-field">
                <span>Date range</span>
                <select id="filterDateRange" name="filterDateRange">
                  <option value="all">All time</option>
                  <option value="last7">Last 7 days</option>
                  <option value="last30">Last 30 days</option>
                  <option value="thisMonth">This month</option>
                  <option value="custom">Custom range</option>
                </select>
              </label>

              <label class="et-field">
                <span>Sort by</span>
                <select id="sortBy" name="sortBy">
                  <option value="date-desc">Newest first</option>
                  <option value="date-asc">Oldest first</option>
                  <option value="amount-desc">Highest amount</option>
                  <option value="amount-asc">Lowest amount</option>
                </select>
              </label>
            </div>

            <div class="et-form-grid et-custom-range is-hidden" id="customDateFields">
              <label class="et-field">
                <span>From</span>
                <input id="customDateStart" name="customDateStart" type="date">
              </label>
              <label class="et-field">
                <span>To</span>
                <input id="customDateEnd" name="customDateEnd" type="date">
              </label>
            </div>
          </section>
        </div>

        <div class="et-stack">
          <section class="et-card">
            <div class="et-section-head">
              <div>
                <p class="et-eyebrow">Expense breakdown</p>
                <h2>Category pulse</h2>
              </div>
            </div>
            <div id="categoryChart" class="et-chart"></div>
          </section>

          <section class="et-card">
            <div class="et-section-head">
              <div>
                <p class="et-eyebrow">Recent history</p>
                <h2>Last 5 transactions</h2>
              </div>
            </div>
            <div id="recentTransactions" class="et-recent-list"></div>
          </section>

          <section class="et-card">
            <div class="et-section-head">
              <div>
                <p class="et-eyebrow">All transactions</p>
                <h2>Ledger</h2>
              </div>
            </div>
            <div id="transactionList" class="et-list"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="et-toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
